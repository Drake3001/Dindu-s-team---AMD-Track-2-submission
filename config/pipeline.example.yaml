# Example pipeline configuration for main.py
# API keys remain in credentials/.env — set provider/model here only.

input:
  tasks: input/tasks.json
  videos_dir: videos
  skip_download: false

output:
  path: output/results.json

pipeline:
  fps: 1.0
  max_dim: 512
  prune_threshold: 5.0
  grid_cols: 4
  grid_rows: 4
  max_frames: 240
  concurrency:
    max_download_workers: 2
    max_preprocess_workers: null   # null -> min(tasks, cpu_count)
    max_inference_workers: 3

vlm:
  provider: openrouter   # null -> env MODEL_PROVIDER
  model: null            # null -> env OPENROUTER_MODEL / FIREWORKS_MODEL
  temperature: 0.0
  max_tokens: 1024
  timeout_seconds: 60
  prompt: detailed_chronological   # prompts/video_analysis/*.md

captions:
  provider: openrouter
  model: null
  temperature: null      # null -> per-style default (creative styles use 1.0)
  max_tokens: 512
  timeout_seconds: 60
  styles:                # null -> all caption_generation styles
    - formal
    - sarcastic
    - humorous_tech
    - humorous_non_tech

# Per-style overrides: replace the list above with a mapping like this:
#  styles:
#    formal:
#      temperature: 0.3
#    sarcastic:
#      model: accounts/fireworks/models/creative-caption
#      temperature: 1.0
#    humorous_tech: {}   # inherit all defaults from captions block
