input:
  tasks: input/test.json
  videos_dir: videos
  skip_download: True

output:
  path: output/tasks.json

pipeline:
  strategy: smart
  context_frames: 4
  fps: 1.0
  max_dim: 512
  prune_threshold: 5.0
  grid_cols: 4
  grid_rows: 4
  max_frames: 240
  concurrency:
    max_download_workers: 2
    max_preprocess_workers: null
    max_inference_workers: 3

vlm:
  provider: fireworks
  model: accounts/fireworks/models/qwen3p7-plus
  temperature: 0.0
  max_tokens: 8192
  timeout_seconds: 60
  prompt: detailed_chronological

captions:
  provider: fireworks
  model: accounts/fireworks/models/deepseek-v4-pro
  temperature: 0.2
  max_tokens: 2048
  timeout_seconds: 60
  styles:
    formal: {}
    sarcastic: 
      temperature: 0.6
    humorous_tech:
      temperature: 0.6
    humorous_non_tech:
      temperature: 0.6
